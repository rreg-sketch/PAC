<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Turnos — Fin de Semana</title>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', sans-serif; background: #ffffff; color: #5a6070; min-height: 100vh; }

  :root {
    --blue: #6ab0d4;
    --blue-dark: #3d8ab8;
    --blue-light: #e8f4fb;
    --blue-mid: #b0d8ee;
    --bg: #ffffff;
    --bg-card: #f7f9fc;
    --bg-card2: #eef4f9;
    --border: rgba(106,176,212,0.25);
    --border-strong: rgba(106,176,212,0.55);
    --text-main: #3a4255;
    --text-muted: #8a96a8;
    --text-accent: #6ab0d4;
    --red: #e05a5a;
    --red-bg: rgba(224,90,90,0.08);
    --green: #4da87a;
    --green-bg: rgba(77,168,122,0.1);
  }

  #app { min-height: 100vh; }

  .site-header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 2rem;
    display: flex; align-items: center; justify-content: center;
  }
  .site-header img { height: 80px; max-width: 480px; object-fit: contain; }

  .nav {
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    padding: 0.5rem 2rem; border-bottom: 1px solid var(--border);
    background: #fff; position: sticky; top: 0; z-index: 100;
  }
  .nav-tab {
    padding: 0.45rem 1.25rem; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border: 1px solid transparent; border-radius: 20px;
    background: none; color: var(--text-muted); transition: all 0.2s;
    font-family: 'Lato', sans-serif; font-weight: 400;
  }
  .nav-tab:hover { color: var(--blue); border-color: var(--border); }
  .nav-tab.active { color: #fff; border-color: var(--blue); background: var(--blue); }

  .hero {
    text-align: center; padding: 2.5rem 2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--blue-light);
  }
  .hero h1 { font-size: 1.8rem; color: var(--blue-dark); font-weight: 300; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
  .hero p { color: var(--text-muted); font-size: 0.9rem; }
  .hero-line { width: 40px; height: 2px; background: var(--blue); margin: 0.75rem auto; border-radius: 2px; }

  .section { padding: 2rem; max-width: 1100px; margin: 0 auto; }

  .day-group { margin-bottom: 2rem; }
  .day-header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
    padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
  }
  .day-label { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--blue); font-weight: 700; }
  .day-line { flex: 1; height: 1px; background: var(--border); }

  .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.65rem; }

  .slot {
    border: 1px solid var(--border); border-radius: 8px;
    padding: 0.75rem 1rem; cursor: pointer; transition: all 0.2s;
    background: #fff; position: relative;
  }
  .slot:hover:not(.slot-full):not(.slot-selected) { border-color: var(--blue); background: var(--blue-light); }
  .slot-selected { border-color: var(--blue); background: var(--blue-light); box-shadow: 0 0 0 3px rgba(106,176,212,0.18); }
  .slot-full { opacity: 0.5; cursor: default; background: #f9f9f9; }
  .slot-time { font-size: 0.92rem; color: var(--text-main); font-weight: 700; }
  .slot-status { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.2rem; }
  .slot-status.libre { color: var(--blue); }
  .slot-status.completo { color: var(--text-muted); }
  .slot-check { position: absolute; top: 0.5rem; right: 0.5rem; color: var(--blue); font-size: 14px; }

  .booking-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #fff; border-top: 1px solid var(--border-strong);
    padding: 0.85rem 2rem; display: flex; align-items: center; gap: 1rem;
    z-index: 200; flex-wrap: wrap; box-shadow: 0 -4px 16px rgba(106,176,212,0.1);
    transition: transform 0.3s;
  }
  .booking-panel.hidden { transform: translateY(100%); }
  .booking-count { font-size: 0.8rem; color: var(--blue-dark); letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; flex: 1; }

  .btn {
    padding: 0.55rem 1.4rem; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 20px; font-family: 'Lato', sans-serif; transition: all 0.2s; font-weight: 700;
  }
  .btn-gold { background: var(--blue); color: #fff; border: none; }
  .btn-gold:hover { background: var(--blue-dark); }
  .btn-outline { background: none; border: 1px solid var(--border-strong); color: var(--text-muted); }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
  .btn-danger { background: var(--red); color: white; border: none; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-sm { padding: 0.3rem 0.85rem; font-size: 0.72rem; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(58,66,85,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 300; padding: 1rem;
  }
  .modal {
    background: #fff; border: 1px solid var(--border-strong);
    border-radius: 12px; padding: 2rem; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h2 { color: var(--blue-dark); font-size: 1.1rem; font-weight: 300; letter-spacing: 0.04em; margin-bottom: 0.25rem; }
  .modal-subtitle { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.5rem; }
  .modal-slots-preview {
    background: var(--blue-light); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.75rem 1rem; margin-bottom: 1.5rem; font-size: 0.82rem; color: var(--blue-dark); line-height: 1.9;
  }

  .form-group { margin-bottom: 1.25rem; }
  .form-label { display: block; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.4rem; font-weight: 700; }
  .form-input {
    width: 100%; padding: 0.65rem 0.9rem; background: #fff;
    border: 1px solid var(--border); border-radius: 6px; color: var(--text-main);
    font-size: 0.9rem; font-family: 'Lato', sans-serif; transition: border-color 0.2s; outline: none;
  }
  .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(106,176,212,0.15); }
  .form-input.error { border-color: var(--red); }
  .form-error { font-size: 0.72rem; color: var(--red); margin-top: 0.3rem; }
  .form-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }

  .success-msg { text-align: center; padding: 1.5rem; }
  .success-icon { font-size: 2.5rem; color: var(--blue); margin-bottom: 1rem; }
  .success-msg h3 { color: var(--blue-dark); margin-bottom: 0.5rem; font-weight: 300; font-size: 1.2rem; }
  .success-msg p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

  .login-wrap { max-width: 360px; margin: 4rem auto; padding: 2rem; }
  .login-wrap h2 { color: var(--blue-dark); margin-bottom: 0.25rem; font-size: 1.2rem; font-weight: 300; }
  .login-wrap p { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 2rem; }
  .login-err { background: var(--red-bg); border: 1px solid rgba(224,90,90,0.3); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.8rem; color: var(--red); margin-bottom: 1rem; }

  .admin-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
  }
  .admin-header h2 { color: var(--blue-dark); font-size: 1.1rem; font-weight: 300; letter-spacing: 0.02em; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th {
    text-align: left; padding: 0.6rem 0.75rem; font-size: 0.68rem; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 700;
  }
  td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); color: var(--text-main); }
  tr:hover td { background: var(--blue-light); }
  .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 10px; font-size: 0.68rem; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; }
  .badge-green { background: var(--green-bg); color: var(--green); }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .stat-card { background: var(--blue-light); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
  .stat-num { font-size: 1.8rem; color: var(--blue-dark); font-weight: 300; }
  .stat-label { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.2rem; font-weight: 700; }

  .config-section { margin-bottom: 2.5rem; }
  .config-section h3 { color: var(--blue); font-size: 0.78rem; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  .config-slot-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 1px solid rgba(106,176,212,0.1); flex-wrap: wrap; }
  .config-slot-row select, .config-slot-row input[type="time"] {
    background: #fff; border: 1px solid var(--border); color: var(--text-main);
    border-radius: 6px; padding: 0.4rem 0.6rem; font-family: 'Lato', sans-serif; font-size: 0.82rem; outline: none;
  }
  .config-slot-row select:focus, .config-slot-row input[type="time"]:focus { border-color: var(--blue); }
  .add-row { display: flex; align-items: center; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }

  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
  .tab-item {
    padding: 0.65rem 1.25rem; font-size: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase;
    cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent;
    transition: all 0.2s; font-family: 'Lato', sans-serif; font-weight: 700;
  }
  .tab-item:hover { color: var(--blue); }
  .tab-item.active { color: var(--blue-dark); border-bottom-color: var(--blue); }
  .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.85rem; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.25s ease; }
</style>
</head>

function getSlots() {
  try { const s = localStorage.getItem('wk_slots'); return s ? JSON.parse(s) : DEFAULT_SLOTS; } catch { return DEFAULT_SLOTS; }
}
function saveSlots(slots) { localStorage.setItem('wk_slots', JSON.stringify(slots)); }
function getReservations() {
  try { const r = localStorage.getItem('wk_reservations'); return r ? JSON.parse(r) : []; } catch { return []; }
}
function saveReservations(res) { localStorage.setItem('wk_reservations', JSON.stringify(res)); }
function getAdminCreds() {
  try { const c = localStorage.getItem('wk_admin_creds'); return c ? JSON.parse(c) : {user:'admin',pass:'admin1234'}; } catch { return {user:'admin',pass:'admin1234'}; }
}
function saveAdminCreds(creds) { localStorage.setItem('wk_admin_creds', JSON.stringify(creds)); }

let state = {
  view: 'public',
  adminTab: 'reservations',
  adminLoggedIn: false,
  selected: [],
  modal: null,
  formData: { name: '', phone: '', email: '' },
  formErrors: {},
  slots: getSlots(),
  reservations: getReservations(),
  adminForm: { user: '', pass: '' },
  adminError: '',

  successSlots: [],
  filterDay: 'Todos',
  filterBooked: 'Todos',
  pwdMsg: null,
};

function validate(form) {
  const errs = {};
  if (!form.name.trim()) errs.name = 'El nombre es obligatorio';
  if (!form.phone.trim()) errs.phone = 'El teléfono es obligatorio';
  else if (!/^\d{9}$/.test(form.phone.replace(/\s/g,''))) errs.phone = 'El teléfono debe tener exactamente 9 dígitos';
  if (!form.email.trim()) errs.email = 'El email es obligatorio';
  else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email)) errs.email = 'El email no tiene un formato válido';
  return errs;
}

function exportExcel() {
  const res = state.reservations;
  if (!res.length) { alert('No hay reservas para exportar'); return; }
  let csv = '\uFEFF'; // BOM para que Excel lo abra bien en UTF-8
  csv += 'Nombre,Teléfono,Email,Día,Inicio,Fin,Fecha Reserva\n';
  res.forEach(r => {
    csv += `"${r.name}","${r.phone}","${r.email}","${r.day}","${r.start}","${r.end}","${r.createdAt}"\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'reservas_finde.csv'; a.click();
  URL.revokeObjectURL(url);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const nav = document.createElement('div');
  nav.className = 'nav';
  nav.innerHTML = `
    <button class="nav-tab ${state.view==='public'?'active':''}" onclick="setView('public')"><i class="ti ti-calendar-event" aria-hidden="true"></i> Reservar turno</button>
    <button class="nav-tab ${state.view==='admin'?'active':''}" onclick="setView('admin')"><i class="ti ti-lock" aria-hidden="true"></i> Administración</button>
  `;
  app.appendChild(nav);

  if (state.view === 'public') renderPublic(app);
  else renderAdmin(app);

  if (state.modal === 'booking') renderBookingModal(app);
  if (state.modal === 'success') renderSuccessModal(app);
}

  hero.className = 'hero';
  hero.innerHTML = `
    <h1>Reserva tu turno</h1>
    <div class="hero-line"></div>
    <p>Selecciona uno o varios horarios del fin de semana y formaliza tu reserva</p>
  `;
  app.appendChild(hero);

  const section = document.createElement('div');
  section.className = 'section fade-in';

  const days = ['Viernes','Sábado','Domingo'];
  const reservedIds = state.reservations.map(r => r.slotId);

  days.forEach(day => {
    const daySlots = state.slots.filter(s => s.day === day);
    if (!daySlots.length) return;
    const grp = document.createElement('div');
    grp.className = 'day-group';
    grp.innerHTML = `<div class="day-header"><div class="day-line"></div><span class="day-label">${day}</span><div class="day-line"></div></div>`;
    const grid = document.createElement('div');
    grid.className = 'slots-grid';
    daySlots.forEach(slot => {
      const full = reservedIds.includes(slot.id);
      const sel = state.selected.includes(slot.id);
      const div = document.createElement('div');
      div.className = 'slot' + (full?' slot-full':'') + (sel?' slot-selected':'');
      div.innerHTML = `
        <div class="slot-time">${slot.start} – ${slot.end}</div>
        <div class="slot-status ${full?'completo':'libre'}">${full?'Completo':'Disponible'}</div>
        ${sel?'<i class="ti ti-check slot-check" aria-hidden="true"></i>':''}
      `;
      if (!full) div.onclick = () => toggleSlot(slot.id);
      grid.appendChild(div);
    });
    grp.appendChild(grid);
    section.appendChild(grp);
  });

  if (!state.slots.length) {
    section.innerHTML += '<div class="empty-state"><i class="ti ti-calendar-off" style="font-size:2rem;color:var(--text-muted)" aria-hidden="true"></i><br>No hay turnos configurados</div>';
  }

  app.appendChild(section);

  const panel = document.createElement('div');
  panel.className = 'booking-panel' + (state.selected.length ? '' : ' hidden');
  const selSlots = state.slots.filter(s => state.selected.includes(s.id));
  panel.innerHTML = `
    <div class="booking-count"><i class="ti ti-clock" aria-hidden="true"></i> ${state.selected.length} turno${state.selected.length!==1?'s':''} seleccionado${state.selected.length!==1?'s':''}</div>
    <div style="font-size:0.78rem;color:var(--text-muted);flex:2;">${selSlots.map(s=>`${s.day} ${s.start}`).join(' · ')}</div>
    <button class="btn btn-outline btn-sm" onclick="clearSelected()">Limpiar</button>
    <button class="btn btn-gold btn-sm" onclick="openBooking()">Confirmar reserva</button>
  `;
  app.appendChild(panel);
}

function renderReservations(container) {
  const res = state.reservations;
  const slots = state.slots;
  const resMap = {};
  res.forEach(r => { resMap[r.slotId] = r; });

  const totalSlots = slots.length;
  const bookedCount = res.length;
  const freeCount = totalSlots - bookedCount;
  const pct = totalSlots > 0 ? Math.round((bookedCount / totalSlots) * 100) : 0;

  const days = ['Viernes','Sábado','Domingo'];
  const activeDays = state.filterDay === 'Todos' ? days : [state.filterDay];

  const calHeader = document.createElement('div');
  calHeader.className = 'admin-header';
  calHeader.innerHTML = `

    </div>
    <button class="btn btn-outline btn-sm" onclick="exportExcel()"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i> Exportar CSV</button>

    <div class="stat-card"><div class="stat-num">${freeCount}</div><div class="stat-label">Libres</div></div>

      <div style="width:12px;height:12px;border-radius:3px;background:var(--bg-card);border:0.5px solid var(--border)"></div> Libre

  ['Todos','Viernes','Sábado','Domingo'].forEach(d => {
    const btn = document.createElement('button');

    btn.textContent = d;
    if (state.filterDay === d) { btn.style.cssText = 'background:rgba(90,158,26,0.15);border-color:#5a9e1a;color:#5a9e1a;'; }
    btn.onclick = () => { state.filterDay = d; render(); };
    filterBar.appendChild(btn);
  });
  const sep = document.createElement('div');
  sep.style.cssText = 'width:1px;background:var(--border);margin:0 4px';

    if (state.filterBooked === b) { btn.style.cssText = 'background:rgba(200,169,110,0.12);border-color:var(--gold);color:var(--gold);'; }
    btn.onclick = () => { state.filterBooked = b; render(); };
    filterBar.appendChild(btn);

      if (r) {
        card.innerHTML = `
          <div style="font-size:0.8rem;font-weight:500;color:#a8d96a">${slot.start} – ${slot.end}</div>

            <div><i class="ti ti-phone" aria-hidden="true" style="font-size:12px;vertical-align:-1px;color:#5a9e1a"></i> ${r.phone}</div>
            <div><i class="ti ti-mail" aria-hidden="true" style="font-size:12px;vertical-align:-1px;color:#5a9e1a"></i> ${r.email}</div>
            <div style="margin-top:4px;font-size:0.68rem;color:var(--text-muted)"><i class="ti ti-clock" aria-hidden="true" style="font-size:11px;vertical-align:-1px"></i> Reservado: ${r.createdAt}</div>
            <div style="margin-top:6px"><button style="font-size:0.68rem;padding:0.25rem 0.6rem;background:var(--red);color:white;border:none;border-radius:3px;cursor:pointer;font-family:inherit" onclick="deleteReservation('${r.id}')"><i class="ti ti-trash" aria-hidden="true"></i> Eliminar</button></div>
          </div>
        `;
        card.onmouseenter = () => { const t = card.querySelector('.cal-tooltip'); if(t) t.style.display='block'; };
        card.onmouseleave = () => { const t = card.querySelector('.cal-tooltip'); if(t) t.style.display='none'; };
      } else {
        card.innerHTML = `
          <div style="font-size:0.8rem;color:var(--text-main)">${slot.start} – ${slot.end}</div>
          <div style="font-size:0.68rem;color:var(--text-muted);margin-top:2px;letter-spacing:0.06em">Disponible</div>
        `;
      }
      col.appendChild(card);
    });
    colsWrap.appendChild(col);
  });

  const exportBar = document.createElement('div');
  exportBar.style.cssText = 'margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;';
  exportBar.innerHTML = `<button class="btn btn-outline btn-sm" onclick="exportExcel()"><i class="ti ti-file-spreadsheet" aria-hidden="true"></i> Exportar todas las reservas a CSV</button>`;
  container.appendChild(exportBar);
}

window.setView = (v) => { state.view = v; render(); };
window.setAdminTab = (t) => { state.adminTab = t; render(); };
window.toggleSlot = (id) => {
  if (state.selected.includes(id)) state.selected = state.selected.filter(s=>s!==id);
  else state.selected.push(id);
  render();
};
window.clearSelected = () => { state.selected = []; render(); };
window.openBooking = () => { state.modal = 'booking'; render(); };
window.closeModal = () => { state.modal = null; render(); };
window.submitBooking = () => {
  const name = document.getElementById('f_name').value.trim();
  const phone = document.getElementById('f_phone').value.trim();
  const email = document.getElementById('f_email').value.trim();
  state.formData = {name, phone, email};
  state.formErrors = validate(state.formData);
  if (Object.keys(state.formErrors).length) { render(); return; }
  const selSlots = state.slots.filter(s => state.selected.includes(s.id));
  const now = new Date().toLocaleString('es-ES');
  selSlots.forEach(slot => {
    state.reservations.push({
      id: 'r'+Date.now()+Math.random().toString(36).slice(2),
      slotId: slot.id,
      name, phone, email,
      day: slot.day, start: slot.start, end: slot.end,
      createdAt: now
    });
  });
  saveReservations(state.reservations);
  state.successSlots = selSlots;
  state.selected = [];
  state.formData = {name:'',phone:'',email:''};
  state.formErrors = {};
  state.modal = 'success';
  render();
};
window.doLogin = () => {
  const user = document.getElementById('a_user').value;
  const pass = document.getElementById('a_pass').value;
  state.adminForm = {user, pass};
  const creds = getAdminCreds();
  if (user === creds.user && pass === creds.pass) {
    state.adminLoggedIn = true; state.adminError = '';
  } else {
    state.adminError = 'Usuario o contraseña incorrectos';
  }
  render();
};
window.logout = () => { state.adminLoggedIn = false; state.adminForm={user:'',pass:''}; render(); };
window.changePassword = () => {
  const newUser = document.getElementById('pwd_user').value.trim();
  const current = document.getElementById('pwd_current').value;
  const newPass = document.getElementById('pwd_new').value;
  const repeat = document.getElementById('pwd_repeat').value;
  const creds = getAdminCreds();
  if (current !== creds.pass) { state.pwdMsg = {type:'err',text:'La contraseña actual no es correcta'}; render(); return; }
  if (newPass.length < 6) { state.pwdMsg = {type:'err',text:'La nueva contraseña debe tener al menos 6 caracteres'}; render(); return; }
  if (newPass !== repeat) { state.pwdMsg = {type:'err',text:'Las contraseñas nuevas no coinciden'}; render(); return; }
  const updatedUser = newUser || creds.user;
  saveAdminCreds({user: updatedUser, pass: newPass});
  state.pwdMsg = {type:'ok',text:'Credenciales actualizadas correctamente'};
  render();
};
window.deleteReservation = (id) => {
  if (!confirm('¿Eliminar esta reserva?')) return;
  state.reservations = state.reservations.filter(r=>r.id!==id);
  saveReservations(state.reservations);
  render();
};
window.setFilter = (v) => { state.filterDay = v; render(); };
window.setFilterBooked = (v) => { state.filterBooked = v; render(); };
window.exportExcel = exportExcel;
window.updateSlot = (id, field, val) => {
  const s = state.slots.find(s=>s.id===id);
  if (s) s[field] = val;
  saveSlots(state.slots);
};
window.deleteSlot = (id) => {
  if (!confirm('¿Eliminar este turno? Las reservas existentes se conservarán.')) return;
  state.slots = state.slots.filter(s=>s.id!==id);
  saveSlots(state.slots);
  render();
};
window.addSlot = () => {
  const day = document.getElementById('new_day').value;
  const start = document.getElementById('new_start').value;
  const end = document.getElementById('new_end').value;
  if (!start || !end) { alert('Indica hora de inicio y fin'); return; }
  state.slots.push({id:'s'+Date.now(), day, start, end});
  saveSlots(state.slots);
  render();
};
window.resetSlots = () => {
  if (!confirm('¿Restaurar los turnos por defecto? Se perderá la configuración actual.')) return;
  state.slots = JSON.parse(JSON.stringify(DEFAULT_SLOTS));
  saveSlots(state.slots);
  render();
};

render();
</script>
</body>
</html>
